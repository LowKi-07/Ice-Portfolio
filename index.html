<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiswarya — Fashion Designer &amp; Creative Director</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AISWARYA — Modern Fashion Portfolio
   White background · Jost sans-serif · uncropped padded images
   ============================================================ */
:root{
  --ink:#141414;
  --ink-soft:#5b5b5b;
  --mute:#8d8d8d;
  --bg:#ffffff;
  --bg-2:#f6f6f4;
  --line:#e6e6e3;
  --accent:#3a4a6b;       /* muted indigo accent */
  --sans:'Jost','Helvetica Neue',Arial,sans-serif;
  --ease:cubic-bezier(.6,.01,.2,1);
  --pad:40px;             /* image padding requested */
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-weight:300;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.6;
}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--ink);color:#fff;}

/* ============ IMAGE FRAME — uncropped + 40px white padding ============ */
.frame{
  background:#ffffff;
  padding:var(--pad);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  width:100%;height:100%;
}
.frame img{
  width:100%;height:100%;
  object-fit:contain;          /* show whole image, never crop */
  transition:transform .6s var(--ease);
}
.frame.hover-zoom:hover img{transform:scale(1.03);}
@media(max-width:760px){:root{--pad:24px;}}

/* ============ NAVIGATION ============ */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px clamp(20px,4vw,56px);
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(14px);
  border-bottom:1px solid transparent;
  transition:border-color .4s var(--ease),transform .5s var(--ease);
}
.nav.scrolled{border-color:var(--line);}
.nav.hidden{transform:translateY(-105%);}
.nav-logo{
  font-size:17px;font-weight:600;letter-spacing:.06em;
}
.nav-logo span{
  display:block;font-size:9.5px;font-weight:400;letter-spacing:.26em;
  color:var(--mute);text-transform:uppercase;margin-top:1px;
}
.nav-links{display:flex;gap:clamp(20px,3vw,42px);list-style:none;}
.nav-links a{
  font-size:12.5px;font-weight:400;letter-spacing:.03em;
  position:relative;padding:5px 0;color:var(--ink-soft);
  transition:color .3s var(--ease);
}
.nav-links a:hover,.nav-links a.active{color:var(--ink);}
.nav-links a::after{
  content:"";position:absolute;left:0;bottom:0;height:1.5px;width:0;
  background:var(--ink);transition:width .35s var(--ease);
}
.nav-links a.active::after{width:100%;}
.nav-toggle{display:none;}

@media(max-width:760px){
  .nav-links{
    position:fixed;inset:0;background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;gap:8px;
    transform:translateX(100%);transition:transform .5s var(--ease);
  }
  .nav-links.open{transform:translateX(0);}
  .nav-links a{font-size:24px;font-weight:300;padding:14px;}
  .nav-toggle{
    display:flex;flex-direction:column;gap:5px;width:26px;
    z-index:1001;cursor:pointer;
  }
  .nav-toggle span{height:1.6px;width:100%;background:var(--ink);
    transition:.35s var(--ease);}
  .nav-toggle.open span:nth-child(1){transform:translateY(6.6px) rotate(45deg);}
  .nav-toggle.open span:nth-child(2){opacity:0;}
  .nav-toggle.open span:nth-child(3){transform:translateY(-6.6px) rotate(-45deg);}
}

/* ============ TRANSITION ============ */
.view{display:none;animation:fadeUp .55s var(--ease);}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ============ REVEAL ON SCROLL ============ */
.reveal{opacity:0;transform:translateY(26px);
  transition:opacity .8s var(--ease),transform .8s var(--ease);}
.reveal.in{opacity:1;transform:none;}

/* shared layout */
.wrap{padding-left:clamp(20px,4vw,56px);padding-right:clamp(20px,4vw,56px);}
.section{padding-top:clamp(70px,9vw,130px);padding-bottom:clamp(70px,9vw,130px);}

.eyebrow{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:20px;
}

/* ============ HOME — HERO ============ */
.hero{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding-top:140px;padding-bottom:60px;
}
.hero-top{display:flex;justify-content:space-between;align-items:flex-end;
  flex-wrap:wrap;gap:24px 48px;margin-bottom:clamp(34px,5vw,64px);}
.hero h1{
  font-size:clamp(46px,8.4vw,128px);font-weight:300;line-height:.98;
  letter-spacing:-.02em;flex:1 1 560px;
}
.hero h1 b{font-weight:600;}
.hero-meta{
  flex:0 0 320px;border-left:1px solid var(--line);padding-left:24px;
}
.hero-meta .role{
  font-size:14px;font-weight:500;letter-spacing:.01em;color:var(--ink);
  line-height:1.55;
}
.hero-meta .sub{
  font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.7;
}
.hero-visual{
  position:relative;height:clamp(360px,58vh,640px);
  border-radius:2px;
}
.hero-tags{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:26px;
}
.hero-tags span{
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-soft);padding:8px 16px;border:1px solid var(--line);
  border-radius:40px;
}
@media(max-width:760px){
  .hero-meta{text-align:left;}
  .hero-top{align-items:flex-start;}
}

/* ============ HOME — INTRO (I'm Aiswarya) ============ */
.intro{
  display:grid;grid-template-columns:.85fr 1.15fr;
  gap:clamp(30px,5vw,80px);align-items:center;
}
.intro-photo{
  width:100%;aspect-ratio:1/1;border-radius:3px;
}
.intro-copy .eyebrow{margin-bottom:18px;}
.intro-copy h2{
  font-size:clamp(32px,4.6vw,64px);font-weight:300;letter-spacing:-.02em;
  line-height:1.04;margin-bottom:24px;
}
.intro-copy h2 b{font-weight:600;}
.intro-copy p{
  font-size:clamp(15px,1.5vw,18px);color:var(--ink-soft);max-width:540px;
  line-height:1.75;
}
.intro-copy .sign{
  margin-top:28px;display:flex;align-items:center;gap:14px;
  font-size:13px;letter-spacing:.04em;color:var(--ink);font-weight:500;
}
.intro-copy .sign .ln{width:36px;height:1.5px;background:var(--ink);}
@media(max-width:780px){
  .intro{grid-template-columns:1fr;gap:26px;}
  .intro-photo{max-width:340px;}
}

/* ============ STAT BAR ============ */
.statbar{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.statbar .st{
  padding:clamp(28px,4vw,52px) clamp(14px,2vw,32px);
  border-right:1px solid var(--line);
}
.statbar .st:last-child{border-right:none;}
.statbar .st .n{font-size:clamp(32px,4vw,56px);font-weight:300;letter-spacing:-.02em;}
.statbar .st .n b{font-weight:600;}
.statbar .st .l{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mute);margin-top:8px;}
@media(max-width:680px){
  .statbar{grid-template-columns:repeat(2,1fr);}
  .statbar .st:nth-child(2){border-right:none;}
  .statbar .st:nth-child(1),.statbar .st:nth-child(2){border-bottom:1px solid var(--line);}
}

/* ============ SECTION HEADING ============ */
.shead{
  display:flex;justify-content:space-between;align-items:flex-end;
  flex-wrap:wrap;gap:18px;margin-bottom:clamp(36px,5vw,64px);
}
.shead h2{
  font-size:clamp(30px,4.6vw,60px);font-weight:300;letter-spacing:-.02em;
  line-height:1.05;
}
.shead h2 b{font-weight:600;}
.shead .scount{font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mute);}

/* ============ FEATURED PROJECTS ============ */
.feat{display:flex;flex-direction:column;gap:clamp(40px,6vw,96px);}
.feat-item{
  display:grid;grid-template-columns:1.15fr .85fr;
  gap:clamp(28px,4vw,72px);align-items:center;cursor:pointer;
}
.feat-item:nth-child(even){grid-template-columns:.85fr 1.15fr;}
.feat-item:nth-child(even) .feat-visual{order:2;}
.feat-visual{
  height:clamp(340px,46vw,560px);border-radius:2px;
}
.feat-info .fnum{
  font-size:12px;font-weight:500;letter-spacing:.1em;color:var(--accent);
  margin-bottom:18px;
}
.feat-info h3{
  font-size:clamp(26px,3.4vw,46px);font-weight:300;letter-spacing:-.02em;
  line-height:1.08;margin-bottom:14px;
}
.feat-info h3 b{font-weight:600;}
.feat-info .fcat{
  font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mute);margin-bottom:20px;
}
.feat-info p{
  font-size:14.5px;color:var(--ink-soft);max-width:400px;margin-bottom:26px;
}
.btn-link{
  display:inline-flex;align-items:center;gap:12px;
  font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
}
.btn-link .ar{
  width:30px;height:1.5px;background:var(--ink);position:relative;
  transition:width .35s var(--ease);
}
.btn-link .ar::after{
  content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;
  border-top:1.5px solid var(--ink);border-right:1.5px solid var(--ink);
  transform:rotate(45deg);
}
.btn-link:hover .ar{width:52px;}
@media(max-width:780px){
  .feat-item,.feat-item:nth-child(even){grid-template-columns:1fr;gap:24px;}
  .feat-item:nth-child(even) .feat-visual{order:0;}
  .feat-visual{height:clamp(320px,80vw,460px);}
}

/* ============ STRIP CTA ============ */
.strip{
  background:var(--ink);color:#fff;border-radius:3px;
  padding:clamp(46px,6vw,90px) clamp(28px,5vw,80px);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:28px;
}
.strip h3{font-size:clamp(26px,3.8vw,52px);font-weight:300;letter-spacing:-.02em;
  line-height:1.1;}
.strip h3 b{font-weight:600;}
.strip .btn-link .ar,.strip .btn-link .ar::after{background:#fff;border-color:#fff;}
.strip .btn-link{color:#fff;}

/* ============ WORK PAGE ============ */
.page-head{
  padding-top:clamp(140px,18vh,210px);
  padding-bottom:clamp(40px,5vw,70px);
}
.page-head h1{
  font-size:clamp(46px,9vw,128px);font-weight:300;letter-spacing:-.025em;
  line-height:1;
}
.page-head h1 b{font-weight:600;}
.page-head p{
  margin-top:24px;max-width:460px;font-size:15px;color:var(--ink-soft);
}

.work-list{display:flex;flex-direction:column;}
.work-item{
  display:grid;grid-template-columns:90px 1fr 1fr;
  gap:clamp(20px,3vw,48px);align-items:center;
  padding:clamp(28px,3.4vw,52px) 0;border-top:1px solid var(--line);
  cursor:pointer;transition:background .35s var(--ease);
}
.work-list .work-item:last-child{border-bottom:1px solid var(--line);}
.work-item .wnum{
  font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.08em;
  align-self:flex-start;padding-top:6px;
}
.work-item .winfo h3{
  font-size:clamp(24px,3vw,40px);font-weight:300;letter-spacing:-.02em;
  line-height:1.08;margin-bottom:14px;
}
.work-item .winfo h3 b{font-weight:600;}
.work-item .wtags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.work-item .wtags span{
  font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-soft);padding:6px 12px;border:1px solid var(--line);
  border-radius:40px;
}
.work-item .winfo p{font-size:13.5px;color:var(--ink-soft);max-width:360px;
  margin-bottom:18px;}
.work-item .wvisual{
  height:clamp(220px,22vw,300px);border-radius:2px;
}
@media(max-width:820px){
  .work-item{grid-template-columns:1fr;gap:18px;}
  .work-item .wnum{padding-top:0;}
  .work-item .wvisual{height:clamp(260px,70vw,360px);order:-1;}
}

/* ============ PROJECT DETAIL ============ */
.proj-head{
  padding-top:clamp(130px,16vh,200px);
  padding-bottom:clamp(34px,4vw,56px);
  padding-left:calc(clamp(20px,4vw,56px) + var(--pad));
  padding-right:calc(clamp(20px,4vw,56px) + var(--pad));
}
.proj-head .pnum{
  font-size:12px;font-weight:500;letter-spacing:.12em;color:var(--accent);
  margin-bottom:18px;
}
.proj-head h1{
  font-size:clamp(40px,7.5vw,108px);font-weight:300;letter-spacing:-.025em;
  line-height:1;
}
.proj-head h1 b{font-weight:600;}
.proj-head .pcat{
  margin-top:20px;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--mute);
}

.proj-cover{
  height:clamp(306px,47.6vw,578px);border-radius:3px;
  margin-bottom:clamp(50px,7vw,110px);
}

.proj-about{
  display:grid;grid-template-columns:.9fr 1.4fr;
  gap:clamp(28px,5vw,90px);
  padding-bottom:clamp(60px,8vw,120px);
  padding-left:var(--pad);padding-right:var(--pad);
}
.proj-about .pa-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:18px;}
.proj-about .pa-lead{
  font-size:clamp(20px,2.5vw,32px);font-weight:300;letter-spacing:-.01em;
  line-height:1.4;
}
.proj-about .pa-lead b{font-weight:600;}
.proj-about .pa-desc{font-size:14.5px;color:var(--ink-soft);margin-top:18px;}
.proj-about ul{list-style:none;margin-top:6px;}
.proj-about li{
  display:flex;gap:14px;padding:13px 0;border-top:1px solid var(--line);
  font-size:13.5px;color:var(--ink-soft);
}
.proj-about li:last-child{border-bottom:1px solid var(--line);}
.proj-about li .li-n{font-weight:500;color:var(--accent);font-size:12px;}
@media(max-width:780px){.proj-about{grid-template-columns:1fr;gap:30px;}}

/* visual blocks */
.blocks{display:flex;flex-direction:column;gap:clamp(16px,2.4vw,34px);}
.block-single{
  height:clamp(323px,44.2vw,612px);border-radius:3px;position:relative;
}
.block-cap{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-top:14px;flex-wrap:wrap;gap:8px;
  padding-left:var(--pad);padding-right:var(--pad);
}
.block-cap .bc-t{font-size:14px;font-weight:500;}
.block-cap .bc-i{font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mute);}
.block-pair{display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(16px,2.4vw,34px);}
.block-pair .bp-cell{height:clamp(320px,40vw,540px);border-radius:3px;}
@media(max-width:760px){.block-pair{grid-template-columns:1fr;}}

/* gallery */
.gallery{padding-top:clamp(40px,5vw,70px);}
.gallery .g-head{margin-bottom:30px;
  padding-left:var(--pad);padding-right:var(--pad);}
.gallery .g-head .pa-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:12px;}
.gallery .g-head h3{font-size:clamp(24px,3.4vw,44px);font-weight:300;
  letter-spacing:-.02em;}
.gallery .g-head h3 b{font-weight:600;}
.g-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:clamp(16px,2vw,28px);
}
.g-grid .g-cell{height:clamp(280px,30vw,400px);border-radius:3px;}
.g-grid .g-cap{font-size:12px;color:var(--ink-soft);margin-top:10px;}

/* palette */
.palette-sec{padding-top:clamp(50px,6vw,90px);
  padding-left:var(--pad);padding-right:var(--pad);}
.palette-sec .pa-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:12px;}
.palette-sec h3{font-size:clamp(24px,3.4vw,44px);font-weight:300;
  letter-spacing:-.02em;margin-bottom:30px;}
.palette-sec h3 b{font-weight:600;}
.swatches{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:14px;
}
.swatch{border-radius:3px;overflow:hidden;border:1px solid var(--line);}
.swatch .sw-color{height:90px;}
.swatch .sw-hex{font-size:11px;padding:10px 12px;color:var(--ink-soft);
  letter-spacing:.04em;}

/* interlude */
.interlude{
  padding:clamp(60px,8vw,120px) 0;text-align:center;
}
.interlude p{
  font-size:clamp(22px,3.4vw,44px);font-weight:300;letter-spacing:-.015em;
  line-height:1.32;max-width:900px;margin:0 auto;
}
.interlude p b{font-weight:600;}
.interlude .src{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-top:22px;}

/* next project */
.next{
  border-top:1px solid var(--line);
  margin-top:clamp(90px,12vw,180px);
  margin-bottom:clamp(70px,10vw,150px);
  margin-left:var(--pad);margin-right:var(--pad);
  padding-top:clamp(60px,7vw,100px);cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:20px;
}
.next .nx-l{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mute);margin-bottom:10px;}
.next h2{font-size:clamp(28px,5vw,72px);font-weight:300;letter-spacing:-.025em;}
.next h2 b{font-weight:600;}

/* ============ ABOUT ============ */
.about-top{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(30px,5vw,80px);align-items:center;
}
.about-portrait{height:clamp(420px,52vw,660px);border-radius:3px;}
.about-copy h1{
  font-size:clamp(40px,6vw,88px);font-weight:300;letter-spacing:-.025em;
  line-height:1;margin-bottom:24px;
}
.about-copy h1 b{font-weight:600;}
.about-copy p{font-size:15px;color:var(--ink-soft);max-width:440px;}
.about-copy p + p{margin-top:16px;}
@media(max-width:820px){.about-top{grid-template-columns:1fr;}}

.roles{display:flex;flex-direction:column;}
.role{
  display:grid;grid-template-columns:54px 1fr 1.1fr;
  gap:clamp(16px,3vw,48px);align-items:center;
  padding:clamp(22px,2.6vw,38px) 0;border-top:1px solid var(--line);
}
.roles .role:last-child{border-bottom:1px solid var(--line);}
.role .r-n{font-size:12px;font-weight:500;color:var(--accent);}
.role .r-t{font-size:clamp(22px,3vw,40px);font-weight:300;letter-spacing:-.02em;}
.role .r-t b{font-weight:600;}
.role .r-d{font-size:13.5px;color:var(--ink-soft);}
@media(max-width:680px){
  .role{grid-template-columns:1fr;gap:8px;}
}

.brands{
  background:var(--bg-2);border-radius:3px;
  padding:clamp(46px,6vw,90px) clamp(28px,5vw,70px);
}
.brands h2{font-size:clamp(26px,3.6vw,48px);font-weight:300;letter-spacing:-.02em;
  margin-bottom:10px;}
.brands h2 b{font-weight:600;}
.brands .b-sub{font-size:14px;color:var(--ink-soft);margin-bottom:40px;
  max-width:420px;}
.brand-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
}
.brand-grid span{
  font-size:15px;font-weight:400;color:var(--ink-soft);
  padding:18px 4px;border-top:1px solid var(--line);
  transition:color .3s var(--ease);
}
.brand-grid span:hover{color:var(--ink);}

/* ============ CONTACT ============ */
.contact{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  padding-top:clamp(150px,18vh,220px);padding-bottom:clamp(60px,8vw,110px);
}
.contact h1{
  font-size:clamp(44px,8.5vw,140px);font-weight:300;letter-spacing:-.025em;
  line-height:1;margin-bottom:34px;
}
.contact h1 b{font-weight:600;}
.contact .c-mail{
  font-size:clamp(22px,3.6vw,44px);font-weight:300;display:inline-block;
  position:relative;
}
.contact .c-mail::after{
  content:"";position:absolute;left:0;bottom:2px;width:100%;height:1.5px;
  background:var(--ink);transform:scaleX(0);transform-origin:left;
  transition:transform .4s var(--ease);
}
.contact .c-mail:hover::after{transform:scaleX(1);}
.contact-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:30px;
  margin-top:clamp(56px,7vw,100px);padding-top:clamp(36px,4vw,56px);
  border-top:1px solid var(--line);
}
.contact-grid .cg .ct{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:14px;}
.contact-grid .cg .cv{font-size:14.5px;color:var(--ink-soft);}
.contact-grid .cg .cv a:hover{color:var(--ink);}
@media(max-width:680px){.contact-grid{grid-template-columns:1fr;gap:26px;}}

/* ============ FOOTER ============ */
.footer{
  border-top:1px solid var(--line);
  padding:clamp(50px,6vw,80px) clamp(20px,4vw,56px) 36px;
}
.footer-top{
  display:flex;justify-content:space-between;align-items:flex-end;
  flex-wrap:wrap;gap:26px;padding-bottom:clamp(40px,5vw,64px);
}
.footer-top .f-big{font-size:clamp(30px,5vw,72px);font-weight:300;
  letter-spacing:-.025em;line-height:1.05;}
.footer-top .f-big b{font-weight:600;}
.footer-top .f-nav{display:flex;gap:22px;flex-wrap:wrap;}
.footer-top .f-nav a{font-size:12.5px;color:var(--ink-soft);
  transition:color .3s var(--ease);}
.footer-top .f-nav a:hover{color:var(--ink);}
.footer-bot{
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;
  padding-top:30px;border-top:1px solid var(--line);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);
}

/* ============ LOADER ============ */
.loader{
  position:fixed;inset:0;z-index:9000;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .6s var(--ease),visibility .6s;
}
.loader.done{opacity:0;visibility:hidden;}
.loader .ld{
  font-size:clamp(26px,4vw,44px);font-weight:600;letter-spacing:.04em;
  position:relative;
}
.loader .ld::after{
  content:"";position:absolute;left:0;right:0;bottom:-12px;height:2px;
  background:var(--line);
}
.loader .ld::before{
  content:"";position:absolute;left:0;bottom:-12px;height:2px;width:0;
  background:var(--ink);z-index:1;
  animation:ldbar 1.3s var(--ease) .15s forwards;
}
@keyframes ldbar{to{width:100%;}}
</style>

function projectView(p){

  const blocks=p.blocks.map(b=>{

        <div class="block-single">${frame(b.img,b.t,'hover-zoom')}</div>
        <div class="block-cap"><span class="bc-t">${b.t}</span><span class="bc-i">${b.i}</span></div>
      </div>`;
    }
    if(b.type==='pair'){
      return b.items.map(it=>`<div class="reveal">
        <div class="block-single">${frame(it,'','hover-zoom')}</div>
      </div>`).join('');
    }
    if(b.type==='interlude'){
      return `<div class="interlude reveal">
        <p>${b.q}</p><div class="src">${b.src}</div>
      </div>`;
    }
    if(b.type==='gallery'){
      return `<div class="gallery reveal">
        <div class="g-head">
          <div class="pa-label">${b.label}</div>
          <h3>${b.title}</h3>
        </div>
        ${b.items.map(it=>`<div class="reveal" style="margin-bottom:clamp(16px,2.4vw,34px);">
          <div class="block-single">${frame(it.img,it.cap,'hover-zoom')}</div>
          <div class="block-cap"><span class="bc-t">${it.cap}</span></div>
        </div>`).join('')}
      </div>`;
    }
    if(b.type==='palette'){
      return `<div class="palette-sec reveal">
        <div class="pa-label">${b.label}</div>
        <h3>${b.title}</h3>
        <div class="swatches">
          ${b.sw.map(h=>`<div class="swatch"><div class="sw-color" style="background:#${h}"></div><div class="sw-hex">#${h}</div></div>`).join('')}
        </div>
      </div>`;
    }
    return '';
  }).join('');

  return `
  <section class="view-project">
    <header class="proj-head wrap">
      <div class="pnum">Project ${p.num} / 06</div>
      <h1>${p.title.join('')}</h1>
      <div class="pcat">${p.category}</div>
    </header>

    <div class="wrap">
      <div class="proj-cover reveal">${frame(p.cover,p.titleFlat)}</div>

      <div class="proj-about reveal">
        <div>
          <div class="pa-label">Overview</div>
          <ul>${p.process.map((s,i)=>`<li><span class="li-n">0${i+1}</span>${s}</li>`).join('')}</ul>

          <p class="pa-desc">${p.intro}</p>

      <div class="blocks">${blocks}</div>

      <div class="next reveal" data-link="project:${next.id}">
        <div>
          <div class="nx-l">Next Project \u2014 ${next.num}</div>

}

/* ============================================================
   ROUTER
   ============================================================ */
function render(route){
  if(route.startsWith('project:')){
    app.innerHTML=projectView(PROJECTS.find(p=>p.id===route.split(':')[1]));
  } else if(route==='work'){ app.innerHTML=workView(); }
  else if(route==='about'){ app.innerHTML=aboutView(); }
  else if(route==='contact'){ app.innerHTML=contactView(); }
  else { app.innerHTML=homeView(); }
  bindLinks();
  initReveal();
}

function go(route){
  if(route===current) { closeMenu(); return; }
  closeMenu();
  window.scrollTo(0,0);
  render(route);
  current=route;
  setNavActive();
}

function bindLinks(){
  document.querySelectorAll('[data-link]').forEach(el=>{
    el.addEventListener('click',e=>{ e.preventDefault(); go(el.getAttribute('data-link')); });
  });
}

document.querySelectorAll('[data-route]').forEach(el=>{
  el.addEventListener('click',e=>{ e.preventDefault(); go(el.getAttribute('data-route')); });
});

/* mobile menu */
const navToggle=document.getElementById('navToggle');
const navLinks=document.getElementById('navLinks');
navToggle.addEventListener('click',()=>{
  const open=navLinks.classList.toggle('open');
  navToggle.classList.toggle('open',open);
});
function closeMenu(){
  navLinks.classList.remove('open');
  navToggle.classList.remove('open');
}

/* nav state */
function setNavActive(){
  document.querySelectorAll('.nav-links a').forEach(a=>{
    a.classList.toggle('active', a.getAttribute('data-route')===current);
  });
}

/* nav scroll: subtle hide + border */
const nav=document.getElementById('nav');
let lastY=0;
function navScroll(){
  const y=window.scrollY;
  nav.classList.toggle('scrolled', y>20);
  if(y>120 && y>lastY){ nav.classList.add('hidden'); }
  else { nav.classList.remove('hidden'); }
  lastY=y;
}

/* reveal on scroll (NO parallax) */
let io;
function initReveal(){
  if(io) io.disconnect();
  io=new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
    });
  },{threshold:0.12, rootMargin:'0px 0px -8% 0px'});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

window.addEventListener('scroll',()=>requestAnimationFrame(navScroll),{passive:true});

/* boot */
window.addEventListener('load',()=>{
  setTimeout(()=>document.getElementById('loader').classList.add('done'),1500);
  render('home');
  current='home';
  setNavActive();
});
</script>
